<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Sign In</title></head>
<body style="margin:0;min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:40px 36px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.15)">
    <h1 style="margin:0 0 6px 0;font-size:24px;color:#1a1a2e">Welcome back</h1>
    <p style="margin:0 0 28px 0;font-size:14px;color:#6b7280">Sign in to your account to continue</p>
    <div style="margin-bottom:20px">
      <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">Email address</label>
      <input type="email" placeholder="you@example.com" style="width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;box-sizing:border-box;outline:none">
    </div>
    <div style="margin-bottom:28px">
      <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">Password</label>
      <input type="password" placeholder="••••••••" style="width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;box-sizing:border-box;outline:none">
    </div>
    <button id="login-btn" style="width:100%;padding:12px;border:none;border-radius:8px;background:#667eea;color:#fff;font-size:15px;font-weight:600;cursor:pointer">Sign In</button>
    <p style="margin:20px 0 0 0;font-size:13px;color:#6b7280;text-align:center">Don't have an account? <a href="#" style="color:#667eea;text-decoration:none;font-weight:600">Sign up</a></p>
  </div>
</body>
</html>
