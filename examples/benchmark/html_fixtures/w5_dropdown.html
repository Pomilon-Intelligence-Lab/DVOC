<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>RetroHub</title></head>
<body style="margin:0;min-height:100vh;background:#2d1b69;font-family:'Courier New',Courier,monospace;display:flex;align-items:center;justify-content:center">
  <div style="background:linear-gradient(180deg,#1a0f3e 0%,#2d1b69 100%);border:2px solid #ff71ce;border-radius:16px;padding:32px;width:320px;text-align:center;box-shadow:0 0 40px rgba(255,113,206,0.15)">
    <div style="font-size:32px;margin-bottom:8px">✦</div>
    <h1 style="margin:0 0 4px 0;font-size:18px;color:#ff71ce;letter-spacing:3px;text-transform:uppercase">RetroHub</h1>
    <p style="margin:0 0 24px 0;font-size:12px;color:#b794f4">your retro computing portal</p>
    <div style="margin-top:12px;border:2px solid #01cdfe;border-radius:8px;overflow:hidden">
      <a href="#" id="menu-profile" style="display:block;padding:14px;color:#01cdfe;text-decoration:none;font-size:14px;border-bottom:1px solid #01cdfe33;letter-spacing:1px">👤 Profile</a>
      <a href="#" id="menu-settings" style="display:block;padding:14px;color:#01cdfe;text-decoration:none;font-size:14px;border-bottom:1px solid #01cdfe33;letter-spacing:1px">⚙️ Settings</a>
      <a href="#" id="menu-logout" style="display:block;padding:14px;color:#ff71ce;text-decoration:none;font-size:14px;letter-spacing:1px">🚪 Logout</a>
    </div>
    <p style="margin:16px 0 0 0;font-size:11px;color:#666">v2.0.1 · 8-bit edition</p>
  </div>
</body>
</html>
